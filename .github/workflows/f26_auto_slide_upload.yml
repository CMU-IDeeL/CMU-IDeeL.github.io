name: F26 Automatic Slide Upload
on:
  schedule:
    - cron: "0 11 * * 2,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  slide-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install python dependencies
        run: pip install Jinja2 PyYAML ruamel.yaml pytz

      - name: Run scripts
        working-directory: F26
        run: |
          python pages/tables_data/upload_slides.py
          python pages/tables_data/generate_table.py

      - name: Commit F26 changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add F26/pages/tables_data/lectures.yaml F26/pages/tables/lectures_table.html F26/pages/tables/recitations.html F26/pages/tables/assignments_table.html
          if git diff --cached --quiet; then
            echo "[INFO] No staged changes, nothing to commit"
          else
            echo "[INFO] Changes detected, committing and pushing"
            git commit -m "GitHub Action: F26 Slide Upload"
            git push
          fi

