name: F26 Process Inbox
on:
  schedule:
    - cron: "0 10 * * 1,3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install python dependencies
        run: pip install Jinja2 PyYAML ruamel.yaml pytz

      - name: Auto-approve eligible pending uploads and regenerate tables
        run: |
          python tools/f26_discord_bot/process_pending_uploads.py --auto-approve-eligible
          python F26/pages/tables_data/generate_table.py

      - name: Commit F26 processed changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add F26/automation/upload_manifest.jsonl F26/pages/tables_data/lectures.yaml F26/pages/tables/lectures_table.html F26/pages/tables/recitations.html F26/pages/tables/assignments_table.html F26/documents/slides
          if git diff --cached --quiet; then
            echo "[INFO] No staged changes, nothing to commit"
          else
            echo "[INFO] Changes detected, committing and pushing"
            git commit -m "GitHub Action: F26 process inbox"
            git push
          fi
